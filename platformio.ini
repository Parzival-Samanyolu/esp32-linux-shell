; PlatformIO project configuration for the ESP32 WROVER-E (Deneyap Kart)
; Framework: ESP-IDF (not Arduino)
;
; The Deneyap WROVER-E carries an ESP32-D0WD-V3 with 8MB PSRAM and 4MB flash.
; The generic "esp-wrover-kit" board profile matches this silicon and turns on
; PSRAM support out of the box; sdkconfig.defaults reinforces the settings.

[env:deneyap_wrover]
platform      = espressif32
board         = esp-wrover-kit
framework     = espidf

; Serial monitor / flashing
monitor_speed = 115200
; 921600/460800 dropped mid-transfer on this cable; 115200 is the safe fallback.
upload_speed  = 115200

; 4MB flash: give the app the big single-app partition (no SPIFFS needed,
; we use the SD card for storage).
board_build.partitions   = partitions.csv
board_build.flash_mode   = dio
board_build.f_flash      = 80000000L
board_upload.flash_size  = 4MB

; PSRAM + FreeRTOS trace facilities come from sdkconfig.defaults.
; snprintf() truncation is intentional/safe throughout, so keep those
; pedantic checks as warnings (not -Werror) for our own sources.
build_flags =
    -DBOARD_HAS_PSRAM
    -Wno-error=format-truncation
